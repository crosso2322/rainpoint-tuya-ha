name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version
        run: |
          VERSION=$(python -c 'import json; print(json.load(open("custom_components/rainpoint_tuya/manifest.json"))["version"])')
          test "v${VERSION}" = "${GITHUB_REF_NAME}"
      - name: Build integration ZIP
        run: |
          mkdir -p dist
          cd custom_components/rainpoint_tuya
          zip -r ../../dist/rainpoint_tuya.zip .
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/rainpoint_tuya.zip
